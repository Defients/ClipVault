name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          python -c "import os, pathlib, sys, tomllib; data = tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8')); version = data['project']['version']; expected = f'v{version}'; ref_name = os.environ['REF_NAME']; sys.exit(f'Tag {ref_name!r} does not match expected release tag {expected!r}.') if ref_name != expected else None"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller clipvault.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipVault-${{ github.ref_name }}
          path: dist/ClipVault.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ClipVault.exe
          generate_release_notes: true
